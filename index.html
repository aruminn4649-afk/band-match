      { id: "92", name: "ブランデー戦記 コピー" }, { id: "93", name: "chilldspot コピー" }, { id: "94", name: "TOMOO コピー" },
      { id: "95", name: "Cody・Lee(理) コピー" }, { id: "96", name: "muque コピー" }, { id: "97", name: "にしな コピー" },
      { id: "98", name: "リーガルリリー コピー" }
    ];

    let myId = localStorage.getItem('k_on_my_id') || 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('k_on_my_id', myId);

    // ローカルの入力状態を完全に独立させる
    let me = { id: myId, name: "未設定の部員", parts: ["ギター"], bio: "設定を変更して使ってください！", bandIds: [] };
    if(localStorage.getItem('k_on_me_v4')) {
      me = JSON.parse(localStorage.getItem('k_on_me_v4'));
    }

    let allUsers = []; 
    let searchQuery = "";
    let currentTab = 'home';
    let currentSelectedBandId = null;

    async function loadData() {
      try {
        const { data, error } = await supabaseClient.from('users').select('*');
        if (!error && data) {
          allUsers = data;
          const myCloudData = allUsers.find(u => u.id === myId);
          if (myCloudData) {
            // バンドの選択状況だけを同期する（名前やパートは入力の邪魔をしないよう上書きしない）
            me.bandIds = myCloudData.bandIds || [];
          }
          // マイページ以外の時だけ画面を自動更新する（入力の邪魔を絶対にしない）
          if (currentTab !== 'mypage') {
            render();
            if (currentSelectedBandId) openModal(currentSelectedBandId);
          }
        }
      } catch (e) { console.error("データ読み込みエラー:", e); }
    }

    setInterval(loadData, 2000);
    loadData();
    setTimeout(render, 100);

    async function saveMyDataToCloud() {
      localStorage.setItem('k_on_me_v4', JSON.stringify(me));
      try {
        await supabaseClient.from('users').upsert(me);
      } catch(e) { console.error("保存エラー:", e); }
    }

    function render() {
      const main = document.getElementById('main-content');
      if (!main) return;
      
      ['home', 'search', 'mypage'].forEach(tab => {
        const el = document.getElementById(`tab-${tab}`);
        if(!el) return;
        if(tab === currentTab) {
          el.className = "flex flex-col items-center gap-1 text-orange-500 font-bold flex-1 py-2";
        } else {
          el.className = "flex flex-col items-center gap-1 text-gray-400 flex-1 py-2";
        }
      });

      if (currentTab === 'home') {
        main.innerHTML = `
          <div class="space-y-3">
            <div class="sticky top-0 bg-gray-50 pt-1 pb-2 z-10">
              <input type="text" id="search-input" placeholder="バンド名で検索..." class="w-full text-xs p-2.5 bg-white border border-gray-200 rounded-xl shadow-sm focus:outline-none"/>
            </div>
            <div id="band-list-container" class="grid gap-2"></div>
          </div>
        `;
        const input = document.getElementById('search-input');
        if(input) {
          input.value = searchQuery;
          input.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterAndRenderBands();
          });
        }
        filterAndRenderBands();
      }

      else if (currentTab === 'search') {
        const myBands = (me.bandIds || []).map(bId => BANDS.find(b => b.id === bId)?.name).filter(Boolean);
        main.innerHTML = `
          <div class="space-y-4">
            <h3 class="font-bold text-gray-700 text-sm">あなたの現在の選択状況</h3>
            <div class="bg-white p-4 rounded-xl border shadow-sm space-y-3">
              <div class="flex justify-between items-center border-b pb-2">
                <span class="font-bold text-gray-800 text-base">${me.name}</span>
                <div class="flex gap-1">${me.parts.map(p => `<span class="text-[10px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded font-bold">${p}</span>`).join('')}</div>
              </div>
              <div>
                <p class="text-xs text-gray-600 bg-gray-50 p-2 rounded">${me.bio || '未入力'}</p>
              </div>
              <div>
                <span class="text-[11px] font-bold text-gray-400 block mb-1">やりたいバンド (${myBands.length})</span>
                <div class="flex flex-wrap gap-1">${myBands.map(b => `<span class="text-xs bg-orange-500 text-white px-2 py-1 rounded-full">🎵 ${b}</span>`).join('')}</div>
              </div>
            </div>
          </div>
        `;
      }

      else if (currentTab === 'mypage') {
        // マイページは最初に1回描画したら、タイマーで絶対に上書きしないようにする
        if(document.getElementById('edit-name')) return;

        const allParts = ['ボーカル', 'ギター', 'ベース', 'ドラム', 'キーボード'];
        let html = `
          <div class="bg-white p-5 rounded-xl border shadow-sm space-y-4">
            <h3 class="font-bold text-gray-800 border-b pb-2 text-base">プロフィール設定</h3>
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">部員名</label>
              <input type="text" id="edit-name" class="w-full text-sm p-2.5 border rounded-lg" />
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">担当パート</label>
              <div class="grid grid-cols-2 gap-2">
        `;
        allParts.forEach(p => {
          html += `
            <label class="flex items-center gap-2 text-xs bg-gray-50 p-2.5 rounded border cursor-pointer">
              <input type="checkbox" name="edit-parts" value="${p}" class="w-4 h-4" /> ${p}
            </label>
          `;
        });
        html += `
              </div>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">ひとことコメント</label>
              <textarea id="edit-bio" class="w-full text-sm p-2.5 border rounded-lg h-20"></textarea>
            </div>
            <button id="save-profile-btn" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold text-sm shadow-md">設定を保存する</button>
          </div>
        `;
        main.innerHTML = html;

        // 現在の値を一度だけ正確にセットする
        document.getElementById('edit-name').value = me.name;
        document.getElementById('edit-bio').value = me.bio || '';
        document.querySelectorAll('input[name="edit-parts"]').forEach(cb => {
          if(me.parts.includes(cb.value)) cb.checked = true;
        });

        document.getElementById('save-profile-btn').addEventListener('click', saveProfile);
      }
    }

    function filterAndRenderBands() {
      const container = document.getElementById('band-list-container');
      if (!container) return;

      const sortedBands = BANDS.map(b => {
        const matchingUsers = allUsers.filter(u => u.bandIds && u.bandIds.includes(b.id));
        return { ...b, count: matchingUsers.length, isMyJoined: me.bandIds && me.bandIds.includes(b.id) };
      }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      const filteredBands = sortedBands.filter(b => b.name.toLowerCase().includes(searchQuery.toLowerCase()));

      let html = "";
      filteredBands.forEach(b => {
        html += `
          <div data-band-id="${b.id}" class="band-card bg-white border rounded-xl p-3 flex justify-between items-center shadow-sm cursor-pointer">
            <div class="flex-1 pr-2 overflow-hidden">
              <h4 class="font-bold text-gray-800 text-sm truncate">${b.name}</h4>
              ${b.isMyJoined ? `<span class="text-[9px] bg-orange-500 text-white px-1.5 py-0.2 rounded-full font-medium">選択中</span>` : ''}
            </div>
            <div class="bg-orange-50 px-2.5 py-1 rounded-lg text-center min-w-[55px]">
              <span class="text-orange-600 font-black text-xs block">🔥 ${b.count}人</span>
            </div>
          </div>
        `;
      });
      container.innerHTML = html || `<p class="text-center text-xs text-gray-400 py-8">見つかりません</p>`;

      container.querySelectorAll('.band-card').forEach(card => {
        card.addEventListener('click', () => openModal(card.dataset.bandId));
      });
    }

    window.switchTab = function(tab) {
      currentTab = tab;
      render();
    }

    async function saveProfile() {
      const name = document.getElementById('edit-name').value;
      const bio = document.getElementById('edit-bio').value;
      const checkboxes = document.querySelectorAll('input[name="edit-parts"]:checked');
      const parts = Array.from(checkboxes).map(cb => cb.value);

      if(!name.trim()) return alert('名前を入力してください');
      if(parts.length === 0) return alert('パートを選択してください');

      me.name = name;
      me.parts = parts;
      me.bio = bio;

      await saveMyDataToCloud();
      alert('保存しました！');
      switchTab('home');
    }

    function openModal(bandId) {
      currentSelectedBandId = bandId;
      const band = BANDS.find(b => b.id === bandId);
      if(!band) return;
      const members = allUsers.filter(u => u.bandIds && u.bandIds.includes(bandId));
      const isMyJoined = me.bandIds && me.bandIds.includes(bandId);

      document.getElementById('modal-band-name').innerText = band.name;
      document.getElementById('modal-band-count').innerText = `🔥 ${members.length}人`;
      
      const btn = document.getElementById('modal-join-btn');
      if(isMyJoined) {
        btn.innerText = 'エントリーを解除する';
        btn.className = 'w-full bg-gray-200 text-gray-600 py-3 rounded-xl font-bold text-sm';
      } else {
        btn.innerText = 'このバンドをやりたい！';
        btn.className = 'w-full bg-orange-500 text-white py-3 rounded-xl font-bold text-sm';
      }
      btn.onclick = () => toggleJoin(bandId);

      const listEl = document.getElementById('modal-member-list');
      listEl.innerHTML = members.length === 0 ? `<p class="text-xs text-gray-400 text-center py-4">誰も選択していません</p>` : members.map(m => `
        <div class="p-2 bg-orange-50/50 rounded-lg border text-xs">
          <div class="flex justify-between font-bold"><span>${m.name}</span><span class="text-orange-600">${m.parts.join(',')}</span></div>
          <p class="text-gray-600 mt-0.5">${m.bio || ''}</p>
        </div>
      `).join('');
      
      document.getElementById('band-modal').classList.remove('hidden');
    }

    window.closeModal = function() {
      document.getElementById('band-modal').classList.add('hidden');
      currentSelectedBandId = null;
    }

    async function toggleJoin(bandId) {
      if (!me.bandIds) me.bandIds = [];
      const index = me.bandIds.indexOf(bandId);
      if (index > -1) me.bandIds.splice(index, 1);
      else me.bandIds.push(bandId);
      
      render();
      if (currentSelectedBandId) openModal(currentSelectedBandId);
      await saveMyDataToCloud();
    }
  </script>
</body>
