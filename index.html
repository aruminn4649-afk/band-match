        customBandsList = [];

        if (!bandError && customData) {
          customData.forEach(cb => {
            // 重複排除
            const existsInStatic = STATIC_BANDS_LIST.some(b => b.id === cb.id || b.name === cb.name);
            if (!existsInStatic) {
              const newCustomBand = { id: cb.id, name: cb.name };
              customBandsList.push(newCustomBand);
              merged.push(newCustomBand);
            }
          });
        }
        ALL_BANDS_MAP = merged;

        // 3. 画面のデータを安全に更新
        if (currentTab === 'custom' || currentTab === 'static') {
          updateBandListOnly();
        } else if (currentTab === 'members' || currentTab === 'mypage') {
          render();
        }
        if (currentSelectedBandId) updateModalOnly(currentSelectedBandId);

      } catch (e) { console.error(e); }
    }

    setInterval(loadData, 2000);
    loadData();

    async function saveMyDataToCloud() {
      localStorage.setItem('k_on_me_v5', JSON.stringify(me));
      try {
        await supabaseClient.from('users').upsert(me);
      } catch(e) { console.error(e); }
    }

    function render() {
      const main = document.getElementById('main-content');
      const headerTag = document.getElementById('sub-title-tag');
      if (!main) return;
      
      // タブメニューのアクティブ表示変更
      ['custom', 'static', 'members', 'mypage'].forEach(tab => {
        const el = document.getElementById(`tab-${tab}`);
        if(!el) return;
        el.className = tab === currentTab 
          ? "flex flex-col items-center gap-1 text-orange-500 font-bold flex-1 py-2" 
          : "flex flex-col items-center gap-1 text-gray-400 flex-1 py-2";
      });

      // ヘッダーのサブタイトル変更
      if (headerTag) {
        if (currentTab === 'custom') headerTag.innerText = '自由募集';
        if (currentTab === 'static') headerTag.innerText = '緩募リスト';
        if (currentTab === 'members') headerTag.innerText = '部員名簿';
        if (currentTab === 'mypage') headerTag.innerText = 'マイページ';
      }

      // 1. 自由募集タブ
      if (currentTab === 'custom') {
        if (document.getElementById('search-input')) {
          updateBandListOnly();
          return;
        }
        main.innerHTML = `
          <div class="space-y-3">
            <div class="sticky top-0 bg-gray-50 pt-1 pb-2 z-10 flex gap-2">
              <input type="text" id="search-input" placeholder="自由募集から検索..." class="flex-1 text-sm p-2.5 bg-white border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:border-orange-500"/>
              <button onclick="addCustomBandPrompt()" class="bg-orange-500 text-white px-3 py-2.5 rounded-xl text-xs font-bold shadow-sm whitespace-nowrap active:bg-orange-600">
                + 新しく募集
              </button>
            </div>
            <div id="band-list-container" class="grid gap-2"></div>
          </div>
        `;
        setupSearchInput();
        updateBandListOnly();
      }

      // 2. 緩募リストタブ
      else if (currentTab === 'static') {
        if (document.getElementById('search-input')) {
          updateBandListOnly();
          return;
        }
        main.innerHTML = `
          <div class="space-y-3">
            <div class="sticky top-0 bg-gray-50 pt-1 pb-2 z-10">
              <input type="text" id="search-input" placeholder="緩募リストから検索..." class="w-full text-sm p-2.5 bg-white border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:border-orange-500"/>
            </div>
            <div id="band-list-container" class="grid gap-2"></div>
          </div>
        `;
        setupSearchInput();
        updateBandListOnly();
      }

      // 3. 部員名簿タブ
      else if (currentTab === 'members') {
        let html = `<div class="space-y-3">`;
        allUsers.forEach(u => {
          const uBands = (u.bandIds || []).map(bId => ALL_BANDS_MAP.find(b => b.id === bId)?.name).filter(Boolean);
          html += `
            <div class="bg-white p-4 rounded-xl border shadow-sm space-y-2">
              <div class="flex justify-between items-center border-b pb-1.5">
                <span class="font-bold text-gray-800 text-base">${u.name}</span>
                <div class="flex flex-wrap gap-1 justify-end max-w-[60%]">
                  ${(u.parts || []).map(p => `<span class="text-[10px] bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded font-medium">${p}</span>`).join('')}
                </div>
              </div>
              <p class="text-xs text-gray-600">${u.bio || '未入力'}</p>
              ${uBands.length > 0 ? `
                <div class="pt-1">
                  <span class="text-[9px] font-bold text-gray-400 block mb-1">選択中のバンド</span>
                  <div class="flex flex-wrap gap-1">${uBands.map(b => `<span class="text-[10px] bg-orange-50 text-orange-600 px-2 py-0.5 rounded-full font-medium">${b}</span>`).join('')}</div>
                </div>
              ` : ''}
            </div>
          `;
        });
        main.innerHTML = html + `</div>`;
      }

      // 4. マイページタブ
      else if (currentTab === 'mypage') {
        if(document.getElementById('edit-name')) return;

        const allParts = ['ボーカル', 'ギター', 'ベース', 'ドラム', 'キーボード'];
        let html = `
          <div class="bg-white p-5 rounded-xl border shadow-sm space-y-4">
            <h3 class="font-bold text-gray-800 border-b pb-2 text-base">プロフィール設定</h3>
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">部員名</label>
              <input type="text" id="edit-name" class="w-full text-sm p-2.5 border rounded-lg focus:outline-none focus:border-orange-500" />
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">担当パート</label>
              <div class="grid grid-cols-2 gap-2">
        `;
        allParts.forEach(p => {
          html += `
            <label class="flex items-center gap-2 text-xs bg-gray-50 p-2.5 rounded border cursor-pointer">
              <input type="checkbox" name="edit-parts" value="${p}" class="w-4 h-4 accent-orange-500" /> ${p}
            </label>
          `;
        });
        html += `
              </div>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">ひとことコメント</label>
              <textarea id="edit-bio" class="w-full text-sm p-2.5 border rounded-lg h-20 focus:outline-none focus:border-orange-500"></textarea>
            </div>
            <button id="save-profile-btn" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold text-sm shadow-md active:bg-orange-600">設定を保存する</button>
          </div>
        `;
        main.innerHTML = html;

        document.getElementById('edit-name').value = me.name;
        document.getElementById('edit-bio').value = me.bio || '';
        document.querySelectorAll('input[name="edit-parts"]').forEach(cb => {
          if(me.parts.includes(cb.value)) cb.checked = true;
        });

        document.getElementById('save-profile-btn').addEventListener('click', saveProfile);
      }
    }

    function setupSearchInput() {
      const input = document.getElementById('search-input');
      if(input) {
        input.value = searchQuery;
        input.addEventListener('input', (e) => {
          searchQuery = e.target.value;
          updateBandListOnly();
        });
      }
    }

    // 検索欄を維持しながら、表示する対象リストを切り替えて描画
    function updateBandListOnly() {
      const container = document.getElementById('band-list-container');
      if (!container) return;

      // 現在のタブに応じてベースにするリストを選択
      const targetBands = (currentTab === 'custom') ? customBandsList : STATIC_BANDS_LIST;

      const sortedBands = targetBands.map(b => {
        const matchingUsers = allUsers.filter(u => u.bandIds && u.bandIds.includes(b.id));
        return { ...b, count: matchingUsers.length, isMyJoined: me.bandIds && me.bandIds.includes(b.id) };
      }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      const filteredBands = sortedBands.filter(b => b.name.toLowerCase().includes(searchQuery.toLowerCase()));

      let html = "";
      filteredBands.forEach(b => {
        html += `
          <div data-band-id="${b.id}" class="band-card bg-white border border-gray-100 rounded-xl p-3 flex justify-between items-center shadow-sm cursor-pointer hover:border-orange-200">
            <div class="flex-1 pr-2 overflow-hidden">
              <h4 class="font-bold text-gray-800 text-sm truncate">${b.name}</h4>
              ${b.isMyJoined ? `<span class="text-[9px] bg-orange-500 text-white px-1.5 py-0.2 rounded-full font-medium">選択中</span>` : ''}
            </div>
            <div class="bg-orange-50 px-2.5 py-1 rounded-lg text-center min-w-[55px]">
              <span class="text-orange-600 font-black text-xs block">${b.count}人</span>
            </div>
          </div>
        `;
      });
      container.innerHTML = html || `<p class="text-center text-xs text-gray-400 py-8">見つかりません</p>`;

      container.querySelectorAll('.band-card').forEach(card => {
        card.addEventListener('click', () => openModal(card.dataset.bandId));
      });
    }

    window.switchTab = function(tab) {
      currentTab = tab;
      searchQuery = ""; // タブ切り替え時に検索文字をリセット
      render();
    }

    // 新規自由募集を登録
    window.addCustomBandPrompt = async function() {
      const name = prompt("募集したいバンド名（または曲名など）を入力してください：");
      if (!name || !name.trim()) return;

      const cleanedName = name.trim();

      // 重複チェック
      const isDuplicate = ALL_BANDS_MAP.some(b => b.name.toLowerCase() === cleanedName.toLowerCase());
      if (isDuplicate) {
        alert("そのバンドはすでに存在します！");
        return;
      }

      const newId = 'custom_' + Math.random().toString(36).substr(2, 9);
      const newBand = { id: newId, name: cleanedName };

      try {
        await supabaseClient.from('bands').insert(newBand);
        alert(`「${cleanedName}」を追加しました！`);
        await loadData();
      } catch (e) {
        console.error(e);
        alert("追加に失敗しました。");
      }
    }

    async function saveProfile() {
      const name = document.getElementById('edit-name').value;
      const bio = document.getElementById('edit-bio').value;
      const checkboxes = document.querySelectorAll('input[name="edit-parts"]:checked');
      const parts = Array.from(checkboxes).map(cb => cb.value);

      if(!name.trim()) return alert('名前を入力してください');
      if(parts.length === 0) return alert('パートを選択してください');

      me.name = name;
      me.parts = parts;
      me.bio = bio;

      await saveMyDataToCloud();
      alert('保存しました！');
      switchTab('custom');
    }

    function openModal(bandId) {
      currentSelectedBandId = bandId;
      updateModalOnly(bandId);
      document.getElementById('band-modal').classList.remove('hidden');
    }

    function updateModalOnly(bandId) {
      const band = ALL_BANDS_MAP.find(b => b.id === bandId);
      if(!band) return;
      const members = allUsers.filter(u => u.bandIds && u.bandIds.includes(bandId));
      const isMyJoined = me.bandIds && me.bandIds.includes(bandId);

      document.getElementById('modal-band-name').innerText = band.name;
      document.getElementById('modal-band-count').innerText = `${members.length}人`;
      
      const btn = document.getElementById('modal-join-btn');
      if(isMyJoined) {
        btn.innerText = 'エントリーを解除する';
        btn.className = 'w-full bg-gray-200 text-gray-600 py-3 rounded-xl font-bold text-sm border';
      } else {
        btn.innerText = 'このバンドをやりたい！';
        btn.className = 'w-full bg-orange-500 text-white py-3 rounded-xl font-bold text-sm';
      }
      btn.onclick = () => toggleJoin(bandId);

      const listEl = document.getElementById('modal-member-list');
      listEl.innerHTML = members.length === 0 ? `<p class="text-xs text-gray-400 text-center py-4">誰も選択していません</p>` : members.map(m => `
        <div class="p-2.5 bg-orange-50/50 rounded-xl border text-xs">
          <div class="flex justify-between font-bold">
            <span>${m.name}</span>
            <span class="text-orange-600 text-[10px]">
              ${(m.parts || []).join(', ')}
            </span>
          </div>
          <p class="text-gray-600 mt-0.5">${m.bio || ''}</p>
        </div>
      `).join('');
    }

    window.closeModal = function() {
      document.getElementById('band-modal').classList.add('hidden');
      currentSelectedBandId = null;
    }

    async function toggleJoin(bandId) {
      if (!me.bandIds) me.bandIds = [];
      const index = me.bandIds.indexOf(bandId);
      if (index > -1) me.bandIds.splice(index, 1);
      else me.bandIds.push(bandId);
      
      if (currentTab === 'custom' || currentTab === 'static') updateBandListOnly();
      if (currentSelectedBandId) updateModalOnly(bandId);
      await saveMyDataToCloud();
    }
  </script>
</body>
</html>
