      me.name = savedMe.name;
      me.parts = savedMe.parts;
      me.bio = savedMe.bio;
    }

    async function loadData() {
      try {
        const { data, error } = await supabaseClient.from('users').select('*');
        if (!error && data) {
          allUsers = data;
          const myCloudData = allUsers.find(u => u.id === myId);
          if (myCloudData) {
            me = myCloudData;
            if (!me.bandIds) me.bandIds = [];
          } else {
            saveMyDataToCloud();
          }
          render();
          if (currentSelectedBandId) {
            openModal(currentSelectedBandId);
          }
        }
      } catch (e) { console.error(e); }
    }

    setInterval(loadData, 1500);
    loadData();

      localStorage.setItem('k_on_me_v3', JSON.stringify({name: me.name, parts: me.parts, bio: me.bio}));
      await supabaseClient.from('users').upsert(me);
    }

          </div>

        if(input) {
          input.value = searchQuery;
          input.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterAndRenderBands();
          });
        }

        const cBtn = document.getElementById('clear-search-btn');
        if(cBtn) {
          cBtn.addEventListener('click', () => {
            searchQuery = "";
            if(input) input.value = "";
            filterAndRenderBands();
          });
        }

        filterAndRenderBands();
      }

      else if (currentTab === 'search') {
        const myBands = (me.bandIds || []).map(bId => BANDS.find(b => b.id === bId)?.name).filter(Boolean);

            <h3 class="font-bold text-gray-700 text-sm"><i class="fa-solid fa-circle-check text-orange-500"></i> あなたの現在の選択状況</h3>
            <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm space-y-3">
              <div class="flex justify-between items-center border-b pb-2">
                <span class="font-bold text-gray-800 text-base">${me.name}</span>
                <div class="flex gap-1 flex-wrap">${me.parts.map(p => `<span class="text-[9px] bg-orange-100 text-orange-600 px-2 py-0.5 rounded font-bold">${p}</span>`).join('')}</div>

              </div>
              <div>
                <span class="text-[10px] font-bold text-gray-400 block mb-1">あなたが「やりたい」バンド (${myBands.length})</span>

    function filterAndRenderBands() {
      const container = document.getElementById('band-list-container');
      const clearBtn = document.getElementById('clear-search-btn');
      const countLabel = document.getElementById('match-count');
      if (!container) return;

      if (searchQuery && clearBtn) clearBtn.classList.remove('hidden');
      else if (clearBtn) clearBtn.classList.add('hidden');

      const sortedBands = BANDS.map(b => {
        const matchingUsers = allUsers.filter(u => u.bandIds && u.bandIds.includes(b.id));
        return { ...b, count: matchingUsers.length, isMyJoined: me.bandIds && me.bandIds.includes(b.id) };
      }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      const filteredBands = sortedBands.filter(b => b.name.toLowerCase().includes(searchQuery.toLowerCase()));
      if(countLabel) countLabel.innerText = `該当: ${filteredBands.length}件 / 全${BANDS.length}組`;

      let html = "";
      if (filteredBands.length === 0) {
        html = `<p class="text-center text-xs text-gray-400 py-8">「${searchQuery}」に一致するバンドはありません。</p>`;
      } else {
        filteredBands.forEach(b => {
          html += `
            <div data-band-id="${b.id}" class="band-card bg-white border border-gray-100 rounded-xl p-3 flex justify-between items-center shadow-sm active:scale-[0.99] transition-transform cursor-pointer hover:border-orange-200">
              <div class="flex-1 pr-2 overflow-hidden">
                <h4 class="font-bold text-gray-800 text-sm truncate">${b.name}</h4>
                ${b.isMyJoined ? `<div class="mt-0.5"><span class="text-[8px] bg-orange-500 text-white px-1.5 py-0.2 rounded-full font-medium"><i class="fa-solid fa-check"></i> 選択中</span></div>` : ''}
              </div>
              <div class="bg-orange-50 px-2.5 py-1 rounded-lg text-center min-w-[55px]">
                <span class="text-orange-600 font-black text-xs block">🔥 ${b.count}人</span>
              </div>
            </div>
          `;
        });
      }
      container.innerHTML = html;

      container.querySelectorAll('.band-card').forEach(card => {
        card.addEventListener('click', () => openModal(card.dataset.bandId));
      });
    }

    window.switchTab = function(tab) {
      currentTab = tab;
      render();
    }

    async function saveProfile() {
      const nameEl = document.getElementById('edit-name');
      const bioEl = document.getElementById('edit-bio');
      if(!nameEl || !bioEl) return;

      const name = nameEl.value;
      const bio = bioEl.value;
      const checkboxes = document.querySelectorAll('input[name="edit-parts"]:checked');
      const parts = Array.from(checkboxes).map(cb => cb.value);

      if(!name.trim()) return alert('名前を入力してください');
      if(parts.length === 0) return alert('パートを選択してください');

      me.name = name;
      me.parts = parts;
      me.bio = bio;

      await saveMyDataToCloud();
      alert('保存しました！');
      switchTab('home');
    }

    function openModal(bandId) {
      currentSelectedBandId = bandId;
      const band = BANDS.find(b => b.id === bandId);
      if(!band) return;
      const members = allUsers.filter(u => u.bandIds && u.bandIds.includes(bandId));
      const isMyJoined = me.bandIds && me.bandIds.includes(bandId);

      document.getElementById('modal-band-name').innerText = band.name;
      document.getElementById('modal-band-count').innerText = `🔥 ${members.length}人`;
      
      const btn = document.getElementById('modal-join-btn');
      if(isMyJoined) {
        btn.innerText = 'エントリーを解除する';
        btn.className = 'w-full py-3 rounded-xl font-bold text-sm shadow-md transition-all bg-gray-100 text-gray-500 border border-gray-300';
      } else {
        btn.innerText = 'このバンドをやりたい！';
        btn.className = 'w-full py-3 rounded-xl font-bold text-sm shadow-md transition-all bg-orange-500 text-white hover:bg-orange-600';
      }
      btn.onclick = () => toggleJoin(bandId);

      const listEl = document.getElementById('modal-member-list');
      if(members.length === 0) {
        listEl.innerHTML = `<p class="text-xs text-gray-400 text-center py-4">誰も選択していません。</p>`;
      } else {
        listEl.innerHTML = members.map(m => `
          <div class="p-3 bg-orange-50/30 rounded-xl border border-orange-200">
            <div class="flex justify-between items-center">
              <span class="font-bold text-xs text-gray-800">${m.name} ${m.id === myId ? '(あなた)' : ''}</span>
              <div class="flex gap-1">
                ${m.parts.map(p => `<span class="text-[8px] bg-orange-500 text-white px-1.5 py-0.5 rounded font-bold">${p}</span>`).join('')}
              </div>
            </div>
            <p class="text-[11px] text-gray-600 mt-1">💬 ${m.bio || ''}</p>
          </div>
        `).join('');
      }
      document.getElementById('band-modal').classList.remove('hidden');
    }

    window.closeModal = function() {
      document.getElementById('band-modal').classList.add('hidden');
      currentSelectedBandId = null;
    }

    async function toggleJoin(bandId) {
      if (!me.bandIds) me.bandIds = [];
      const index = me.bandIds.indexOf(bandId);
      if (index > -1) {
        me.bandIds.splice(index, 1);
      } else {
        me.bandIds.push(bandId);
      }
      await saveMyDataToCloud();
    }
  </script>
