    <main id="main-content" class="flex-1 overflow-y-auto p-4 pb-24">

    <div id="band-modal" class="absolute inset-0 bg-black/50 z-20 hidden flex items-end justify-center">
      <div class="bg-white w-full rounded-t-2xl p-5 max-h-[85vh] flex flex-col space-y-3 shadow-2xl">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto -mt-2 mb-1 shrink-0"></div>
        
        <div class="flex justify-between items-start shrink-0">
          <div>
            <span class="text-[10px] font-bold text-orange-500 tracking-wider">BAND DETAILS</span>

          </div>
        </div>

        <div id="modal-admin-actions" class="flex gap-2 shrink-0 hidden">
          <button id="modal-toggle-status-btn" class="flex-1 py-1.5 rounded text-[10px] font-bold border transition-all"></button>
          <button id="modal-delete-btn" class="bg-red-50 text-red-600 border border-red-200 px-2.5 py-1.5 rounded text-[10px] font-bold active:bg-red-100">🚨 解散</button>
        </div>
        
        <button id="modal-join-btn" class="w-full py-2.5 rounded-xl font-bold text-xs shadow-md transition-all shrink-0"></button>

        <div class="bg-gray-50 border rounded-xl p-2 shrink-0">
          <span class="text-[10px] font-bold text-gray-400 block mb-1">現在のパート編成</span>
          <div id="modal-part-summary" class="flex gap-2 flex-wrap text-[10px]"></div>
        </div>

        <div class="border-t border-gray-100 pt-2 shrink-0">
          <h4 class="font-bold text-[11px] text-gray-500 mb-1 flex items-center gap-1">
            <i class="fa-solid fa-users text-orange-500"></i> エントリー中のメンバー
          </h4>
          <div id="modal-member-list" class="flex flex-wrap gap-1 max-h-[60px] overflow-y-auto"></div>
        </div>

        <div class="border-t border-gray-100 pt-2 flex-1 flex flex-col min-h-0">
          <h4 class="font-bold text-[11px] text-gray-500 mb-1 flex items-center gap-1 shrink-0">
            <i class="fa-solid fa-comments text-orange-500"></i> バンド内作戦会議チャット
          </h4>
          <div id="modal-chat-timeline" class="flex-1 overflow-y-auto space-y-2 py-1 bg-gray-50/50 rounded-lg p-2 border border-gray-100"></div>
          <div class="flex gap-1.5 mt-1.5 shrink-0">
            <input type="text" id="modal-chat-input" placeholder="このバンド内で発言..." class="flex-1 text-xs p-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-orange-500" onkeypress="if(event.key==='Enter') sendBandChatMessage()"/>
            <button onclick="sendBandChatMessage()" class="bg-orange-500 text-white text-xs px-3 py-2 rounded-lg font-bold shadow-sm active:bg-orange-600"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>

        <button onclick="closeModal()" class="w-full bg-gray-100 text-gray-600 py-2 rounded-lg text-xs font-semibold shrink-0">閉じる</button>
      </div>
    </div>

    let currentTab = 'home';
    let currentSelectedBandId = null;
    let isSaving = false;

    async function loadData() {
      if (isSaving) return;
      try {
        const { data: userData, error: userError } = await supabaseClient.from('users').select('*');
        if (!userError && userData) {
          allUsers = userData;
          const myCloudData = allUsers.find(u => u.id === myId);
          if (myCloudData) {
            me.bandIds = myCloudData.bandIds || [];
            if (myCloudData.lineId !== undefined) {
              me.lineId = myCloudData.lineId;
            }
            localStorage.setItem('k_on_me_v9', JSON.stringify(me));
          }
        }

        const { data: bandData, error: bandError } = await supabaseClient.from('bands').select('*');
        if (!bandError && bandData) {
          recruitedBands = bandData;
        }

        const { data: msgData, error: msgError } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
        if (!msgError && msgData) {
          allChatMessages = msgData;
        }

        refreshUI();
      } catch (e) { console.error(e); }
    }

    function refreshUI() {
      if (currentTab === 'home') {
        updateBandListOnly();
      } else if (currentTab === 'archive') {
        updateArchiveListOnly();
      } else if (currentTab === 'search') {
        updateUserListOnly();
      }
      if (currentSelectedBandId) updateModalOnly(currentSelectedBandId);
    }

    setInterval(loadData, 3000);
    loadData();

    async function saveMyDataToCloud() {
      isSaving = true;
      localStorage.setItem('k_on_me_v9', JSON.stringify(me));
      
      const myIndex = allUsers.findIndex(u => u.id === myId);
      const tempMyCloudData = {
        id: me.id,
        name: me.name,
        parts: me.parts,
        bio: me.bio ? `${me.bio} 【${me.grade}】` : `【${me.grade}】`,
        lineId: me.lineId || "", 
        bandIds: me.bandIds
      };
      if (myIndex > -1) {
        allUsers[myIndex] = tempMyCloudData;
      } else {
        allUsers.push(tempMyCloudData);
      }
      refreshUI();

      try {
        await supabaseClient.from('users').upsert(tempMyCloudData);
      } catch(e) { console.error(e); } finally {
        setTimeout(() => { isSaving = false; }, 500);
      }
    }

    async function createNewBand() {
      const bandNameInput = document.getElementById('new-band-name');
      if (!bandNameInput) return;
      const bandName = bandNameInput.value.trim();

      if (!bandName) return alert('バンド名を入力してください');
      if (me.name === "未設定の部員") return alert('マイページからプロフィールを設定してください！');

      const newBandId = 'band_' + Math.random().toString(36).substr(2, 9);
      const newBandData = {
        id: newBandId,
        name: bandName,
        creator_id: me.id,
        creator_name: me.name,
        status: 'open'
      };

      try {
        recruitedBands.push(newBandData);
        if (!me.bandIds) me.bandIds = [];
        if (!me.bandIds.includes(newBandId)) {
          me.bandIds.push(newBandId);
        }

        bandNameInput.value = "";
        refreshUI();
        await supabaseClient.from('bands').insert(newBandData);
        await saveMyDataToCloud();
      } catch (e) { console.error(e); }
    }

    // 【修正】ステータス切替時に意図しない同期ズレを起こさないようロック制御を徹底
    async function toggleBandStatus(bandId) {
      const band = recruitedBands.find(b => b.id === bandId);
      if (!band) return;

      isSaving = true; 
      const nextStatus = band.status === 'closed' ? 'open' : 'closed';
      band.status = nextStatus;

      refreshUI();

      try {
        await supabaseClient.from('bands').update({ status: nextStatus }).eq('id', bandId);
      } catch(e) { console.error(e); } finally {
        setTimeout(() => { isSaving = false; }, 800); 
      }
    }

    async function deleteBand(bandId) {
      if (!confirm('このバンドを解散（削除）しますか？チャット履歴も消去されます。')) return;
      
      try {
        closeModal();
        recruitedBands = recruitedBands.filter(b => b.id !== bandId);
        
        if (me.bandIds) {
          me.bandIds = me.bandIds.filter(id => id !== bandId);
        }

        refreshUI();

        await supabaseClient.from('bands').delete().eq('id', bandId);
        await supabaseClient.from('messages').delete().eq('band_id', bandId);
        await saveMyDataToCloud();
      } catch (e) { console.error(e); }
    }

    async function sendBandChatMessage() {
      if (!currentSelectedBandId) return;
      const chatInput = document.getElementById('modal-chat-input');
      if (!chatInput) return;
      const text = chatInput.value.trim();

      if (!text) return;
      if (me.name === "未設定の部員") return alert('発言するにはプロフィールを設定してください！');

      const newMsg = {
        id: 'msg_' + Math.random().toString(36).substr(2, 9),
        user_id: me.id,
        user_name: me.name,
        user_grade: me.grade || "新入生",
        text: text,
        band_id: currentSelectedBandId,
        created_at: new Date().toISOString()
      };

      try {
        allChatMessages.push(newMsg);
        chatInput.value = "";
        updateModalChatTimeline(currentSelectedBandId);
        await supabaseClient.from('messages').insert(newMsg);
      } catch (e) { console.error(e); }
    }

    function getGradeColor(grade) {
      if(grade === "2年生") return "bg-blue-50 text-blue-600 border-blue-100";
      if(grade === "3年生") return "bg-purple-50 text-purple-600 border-purple-100";
      if(grade === "4年生以上") return "bg-gray-100 text-gray-600 border-gray-200";
      return "bg-green-50 text-green-600 border-green-100";
    }

    function makeMemberBadgesHtml(bandId) {
      const members = allUsers.filter(u => u.bandIds && u.bandIds.includes(bandId));
      if (members.length === 0) {
        return `<div class="text-[10px] text-gray-400 italic mt-1.5">メンバー未登録</div>`;
      }

      let html = `<div class="flex flex-wrap gap-1 mt-2 border-t border-gray-50 pt-1.5">`;
      members.forEach(m => {
        const userBioRaw = m.bio || "";
        const userGrade = m.grade || (userBioRaw.match(/【(.*?)】/) ? userBioRaw.match(/【(.*?)】/)[1] : "新入生");
        const partsStr = (m.parts || []).join('/');
        const gradeColor = getGradeColor(userGrade);

        html += `
          <span class="inline-flex items-center gap-0.5 text-[9px] bg-gray-50 text-gray-700 px-1.5 py-0.5 rounded border border-gray-200/60 font-medium">
            <span class="font-bold text-gray-900">${m.name}</span>
            <span class="text-[8px] px-1 rounded-sm border ${gradeColor} font-black scale-90 origin-left">${userGrade}</span>
            <span class="text-orange-600 text-[8px] font-bold">🎸${partsStr}</span>
          </span>
        `;
      });
      html += `</div>`;
      return html;
    }

    window.showInfoAlert = function() {
      alert("緩募リストは募集するほどではないが、やってみたいというバンドを登録しておくことで同じバンドを誰がやりたがっているかを参考程度に把握することができる機能です");
    }

          <div class="space-y-3">
            <div class="sticky top-0 bg-gray-50 pt-1 pb-2 z-10 space-y-2">
              <input type="text" id="user-search-input" placeholder="名前・学年・パート・LINE IDで部員を検索..." class="w-full text-sm p-2.5 bg-white border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:border-orange-500"/>
            </div>
            <div id="user-list-container" class="space-y-3"></div>
          </div>
        `;
        const userInput = document.getElementById('user-search-input');
        if(userInput) {
          userInput.value = userSearchQuery;
          userInput.addEventListener('input', (e) => {
            userSearchQuery = e.target.value;
            updateUserListOnly();
          });
        }
        updateUserListOnly();
      }

      else if (currentTab === 'mypage') {
        const allParts = ['ボーカル', 'ギター', 'ベース', 'ドラム', 'キーボード'];
        const grades = ['新入生', '2年生', '3年生', '4年生以上'];
        
        let html = `
          <div class="bg-white p-5 rounded-xl border shadow-sm space-y-4">
            <h3 class="font-bold text-gray-800 border-b pb-2 text-base">プロフィール設定</h3>
            
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">部員名</label>
              <input type="text" id="edit-name" class="w-full text-sm p-2.5 border rounded-lg focus:outline-none focus:border-orange-500" />
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">LINE ID（任意）</label>
              <input type="text" id="edit-line-id" placeholder="例: tms_taro123" class="w-full text-sm p-2.5 border rounded-lg focus:outline-none focus:border-orange-500" />
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">学年</label>
              <select id="edit-grade" class="w-full text-sm p-2.5 bg-white border rounded-lg focus:outline-none focus:border-orange-500">
                ${grades.map(g => `<option value="${g}">${g}</option>`).join('')}
              </select>
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">担当パート</label>
              <div class="grid grid-cols-2 gap-2">
        `;
        allParts.forEach(p => {
          html += `
            <label class="flex items-center gap-2 text-xs bg-gray-50 p-2.5 rounded border cursor-pointer">
              <input type="checkbox" name="edit-parts" value="${p}" class="w-4 h-4 accent-orange-500" /> ${p}
            </label>
          `;
        });
        html += `
              </div>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 mb-1">ひとことコメント</label>
              <textarea id="edit-bio" class="w-full text-sm p-2.5 border rounded-lg h-20 focus:outline-none focus:border-orange-500"></textarea>
            </div>
            <button id="save-profile-btn" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold text-sm shadow-md active:bg-orange-600">設定を保存する</button>
          </div>
        `;
        main.innerHTML = html;

        document.getElementById('edit-name').value = me.name;
        document.getElementById('edit-line-id').value = me.lineId || ""; 
        document.getElementById('edit-grade').value = me.grade || "新入生";
        document.getElementById('edit-bio').value = me.bio || '';
        document.querySelectorAll('input[name="edit-parts"]').forEach(cb => {
          if(me.parts.includes(cb.value)) cb.checked = true;
        });

        document.getElementById('save-profile-btn').addEventListener('click', saveProfile);
      }
    }

    function updateBandListOnly() {
      const container = document.getElementById('band-list-container');
      if (!container) return;

      const sortedBands = recruitedBands.map(b => {
        const matchingUsers = allUsers.filter(u => u.bandIds && u.bandIds.includes(b.id));
        return { ...b, count: matchingUsers.length, isMyJoined: me.bandIds && me.bandIds.includes(b.id) };
      }).sort((a, b) => {
        const aClosed = a.status === 'closed' ? 1 : 0;
        const bClosed = b.status === 'closed' ? 1 : 0;
        return aClosed - bClosed || b.count - a.count || a.name.localeCompare(b.name);
      });

      const filteredBands = sortedBands.filter(b => b.name.toLowerCase().includes(searchQuery.toLowerCase()));

      let html = "";
      filteredBands.forEach(b => {
        const isClosed = b.status === 'closed';
        html += `
          <div data-band-id="${b.id}" class="band-card bg-white border border-gray-200/80 rounded-xl p-3 flex flex-col shadow-sm cursor-pointer hover:border-orange-200 ${isClosed ? 'opacity-65 bg-gray-50/50' : ''}">
            <div class="flex justify-between items-center">
              <div class="flex-1 pr-2 overflow-hidden">
                <h4 class="font-bold text-gray-800 text-sm truncate flex items-center gap-1.5">
                  ${b.name}
                  ${isClosed ? `<span class="text-[8px] bg-gray-400 text-white px-1.5 py-0.2 rounded font-black tracking-wider shrink-0">締切済</span>` : ''}
                </h4>
                <div class="flex items-center gap-2 mt-0.5">
                  <span class="text-[9px] text-gray-400">👑 ホスト: ${b.creator_name || '不明'}</span>
                  ${b.isMyJoined ? `<span class="text-[9px] bg-orange-500 text-white px-1.5 py-0.2 rounded-full font-medium">エントリー中</span>` : ''}
                </div>
              </div>
              <div class="${isClosed ? 'bg-gray-200' : 'bg-orange-50'} px-2.5 py-1 rounded-lg text-center min-w-[55px]">
                <span class="${isClosed ? 'text-gray-500' : 'text-orange-600'} font-black text-xs block">🔥 ${b.count}人</span>
              </div>
            </div>
            ${makeMemberBadgesHtml(b.id)}
          </div>
        `;
      });
      container.innerHTML = html || `<p class="text-center text-xs text-gray-400 py-8">募集中のバンドはありません。最初のバンドを作ってみよう！</p>`;

      container.querySelectorAll('.band-card').forEach(card => {
        card.onclick = () => openModal(card.dataset.bandId);
      });
    }

    function updateArchiveListOnly() {
      const container = document.getElementById('archive-list-container');
      if (!container) return;

      const sortedBands = ARCHIVE_BANDS.map(b => {
        const matchingUsers = allUsers.filter(u => u.bandIds && u.bandIds.includes(b.id));
        return { ...b, count: matchingUsers.length, isMyJoined: me.bandIds && me.bandIds.includes(b.id) };
      }).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

      const filteredBands = sortedBands.filter(b => b.name.toLowerCase().includes(archiveSearchQuery.toLowerCase()));

      let html = "";
      filteredBands.forEach(b => {
        html += `
          <div data-band-id="${b.id}" class="band-card bg-white border border-gray-200/80 rounded-xl p-3 flex flex-col shadow-sm cursor-pointer hover:border-orange-200">
            <div class="flex justify-between items-center">
              <div class="flex-1 pr-2 overflow-hidden">
                <h4 class="font-bold text-gray-800 text-sm truncate">${b.name}</h4>
                <div class="flex items-center gap-2 mt-0.5">
                  <span class="text-[9px] text-gray-400">📁 緩募アイテム</span>
                  ${b.isMyJoined ? `<span class="text-[9px] bg-orange-500 text-white px-1.5 py-0.2 rounded-full font-medium">エントリー中</span>` : ''}
                </div>
              </div>
              <div class="bg-orange-50 px-2.5 py-1 rounded-lg text-center min-w-[55px]">
                <span class="text-orange-600 font-black text-xs block">🔥 ${b.count}人</span>
              </div>
            </div>
            ${makeMemberBadgesHtml(b.id)}
          </div>
        `;
      });
      container.innerHTML = html;

      container.querySelectorAll('.band-card').forEach(card => {
        card.onclick = () => openModal(card.dataset.bandId);
      });
    }

    function updateUserListOnly() {
      const container = document.getElementById('user-list-container');
      if (!container) return;

      const filteredUsers = allUsers.filter(u => {
        const userName = (u.name || "").trim();
        if (!userName || userName === "未設定の部員") return false;

        const userBio = u.bio || "";
        const userLineId = u.lineId || "";
        const userGrade = u.grade || (userBio.match(/【(.*?)】/) ? userBio.match(/【(.*?)】/)[1] : "新入生");
        
        const nameMatch = userName.toLowerCase().includes(userSearchQuery.toLowerCase());
        const gradeMatch = userGrade.toLowerCase().includes(userSearchQuery.toLowerCase());
        const lineIdMatch = userLineId.toLowerCase().includes(userSearchQuery.toLowerCase());
        const partsMatch = (u.parts || []).some(p => p.toLowerCase().includes(userSearchQuery.toLowerCase()));
        
        return nameMatch || gradeMatch || lineIdMatch || partsMatch;
      });

      if (filteredUsers.length === 0) {
        container.innerHTML = `<p class="text-center text-xs text-gray-400 py-8">設定済みの部員が見つかりません</p>`;
        return;
      }

      let html = "";
      filteredUsers.forEach(u => {
        const userBands = (u.bandIds || []).map(bId => {
          const b = recruitedBands.find(x => x.id === bId) || ARCHIVE_BANDS.find(x => x.id === bId);
          return b ? b.name : null;
        }).filter(Boolean);

        const isItMe = u.id === myId;
        const userBioRaw = u.bio || "";
        const userGrade = u.grade || (userBioRaw.match(/【(.*?)】/) ? userBioRaw.match(/【(.*?)】/)[1] : "新入生");
        const cleanBio = userBioRaw.replace(/【.*?】/, "").trim();

        const gradeColor = getGradeColor(userGrade);

        html += `
          <div class="bg-white p-4 rounded-xl border shadow-sm space-y-2.5 ${isItMe ? 'border-orange-300 bg-orange-50/10' : ''}">
            <div class="flex justify-between items-center border-b pb-1.5">
              <div class="flex flex-col">
                <div class="flex items-center gap-1.5">
                  <span class="font-bold text-gray-800 text-sm">${u.name}</span>
                  <span class="text-[9px] border px-1.5 py-0.5 rounded-full font-black ${gradeColor}">${userGrade}</span>
                  ${isItMe ? '<span class="text-[10px] text-orange-500 font-normal">(あなた)</span>' : ''}
                </div>
                ${u.lineId ? `<span class="text-[9px] text-green-600 font-medium mt-0.5"><i class="fa-brands fa-line mr-0.5"></i>ID: ${u.lineId}</span>` : ''}
              </div>
              <div class="flex gap-1">${(u.parts || []).map(p => `<span class="text-[9px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded font-bold">${p}</span>`).join('')}</div>
            </div>
            <p class="text-xs text-gray-600 bg-gray-50/80 p-2 rounded">${cleanBio || 'コメントなし'}</p>
            <div class="space-y-1">
              <span class="text-[10px] font-bold text-gray-400 block">エントリー中のバンド (${userBands.length})</span>
              <div class="flex flex-wrap gap-1">
                ${userBands.length === 0 
                  ? '<span class="text-[10px] text-gray-400 italic">まだエントリーしていません</span>' 
                  : userBands.map(b => `<span class="text-[10px] bg-gray-200 text-gray-700 px-2 py-0.5 rounded-full">🎵 ${b}</span>`).join('')}
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    window.switchTab = function(tab) {
      currentTab = tab;
      render();
    }

    async function saveProfile() {
      const name = document.getElementById('edit-name').value;
      const lineId = document.getElementById('edit-line-id').value.trim(); 
      const grade = document.getElementById('edit-grade').value;
      const bio = document.getElementById('edit-bio').value;
      const checkboxes = document.querySelectorAll('input[name="edit-parts"]:checked');
      const parts = Array.from(checkboxes).map(cb => cb.value);

      if(!name.trim() || name.trim() === "未設定の部員") return alert('有効な名前を入力してください');
      if(parts.length === 0) return alert('パートを選択してください');

      me.name = name;
      me.lineId = lineId; 
      me.grade = grade;
      me.parts = parts;
      me.bio = bio;

      await saveMyDataToCloud();
      alert('保存しました！');
      switchTab('home');
    }

    function openModal(bandId) {
      currentSelectedBandId = bandId;
      updateModalOnly(bandId);
      document.getElementById('band-modal').classList.remove('hidden');
      
      setTimeout(() => {
        const tl = document.getElementById('modal-chat-timeline');
        if(tl) tl.scrollTop = tl.scrollHeight;
      }, 100);
    }

    function updateModalOnly(bandId) {
      const isArchive = bandId.startsWith('archive_');
      const band = isArchive 
        ? ARCHIVE_BANDS.find(b => b.id === bandId)
        : recruitedBands.find(b => b.id === bandId);

      if(!band) return;
      const members = allUsers.filter(u => u.bandIds && u.bandIds.includes(bandId));
      const isMyJoined = me.bandIds && me.bandIds.includes(bandId);
      const isClosed = !isArchive && band.status === 'closed';

      document.getElementById('modal-band-name').innerHTML = band.name + (isClosed ? ' <span class="text-xs bg-gray-400 text-white px-1.5 py-0.2 rounded font-black">締切済</span>' : '');
      document.getElementById('modal-band-creator').innerText = isArchive ? "カテゴリ: 緩募リスト（固定）" : `募集主(ホスト): ${band.creator_name || '不明'}`;
      document.getElementById('modal-band-count').innerText = `🔥 ${members.length}人`;
      
      const adminActions = document.getElementById('modal-admin-actions');
      if (!isArchive && band.creator_id === myId) {
        adminActions.classList.remove('hidden');
        
        const statusBtn = document.getElementById('modal-toggle-status-btn');
        if (isClosed) {
          statusBtn.innerText = "🔓 募集を再開する";
          statusBtn.className = "flex-1 py-1.5 rounded text-[10px] font-bold bg-green-50 text-green-600 border border-green-200 active:bg-green-100";
        } else {
          statusBtn.innerText = "🔒 募集を終了する";
          statusBtn.className = "flex-1 py-1.5 rounded text-[10px] font-bold bg-gray-100 text-gray-700 border border-gray-300 active:bg-gray-200";
        }
        statusBtn.onclick = () => toggleBandStatus(band.id);
        document.getElementById('modal-delete-btn').onclick = () => deleteBand(band.id);
      } else {
        adminActions.classList.add('hidden');
      }

      const btn = document.getElementById('modal-join-btn');
      if(isClosed) {
        if(isMyJoined) {
          btn.disabled = false;
          btn.innerText = 'エントリーを解除する（募集締切中）';
          btn.className = 'w-full bg-gray-200 text-gray-600 py-2 rounded-xl font-bold text-xs border shrink-0 active:bg-gray-300';
          btn.onclick = () => toggleJoin(bandId);
        } else {
          btn.disabled = true;
          btn.innerText = '募集が締め切られています';
          btn.className = 'w-full bg-gray-300 text-gray-500 py-2 rounded-xl font-bold text-xs cursor-not-allowed shrink-0';
          btn.onclick = null;
        }
      } else {
        btn.disabled = false;
        if(isMyJoined) {
          btn.innerText = 'エントリーを解除する';
          btn.className = 'w-full bg-gray-200 text-gray-600 py-2 rounded-xl font-bold text-xs border shrink-0';
        } else {
          btn.innerText = 'このバンドをやりたい！';
          btn.className = 'w-full bg-orange-500 text-white py-2 rounded-xl font-bold text-xs shrink-0';
        }
        btn.onclick = () => toggleJoin(bandId);
      }

      const partCounts = { 'ボーカル': 0, 'ギター': 0, 'ベース': 0, 'ドラム': 0, 'キーボード': 0 };
      members.forEach(m => {
        if (m.parts) {
          m.parts.forEach(p => { if(partCounts[p] !== undefined) partCounts[p]++; });
        }
      });
      
      const summaryEl = document.getElementById('modal-part-summary');
      summaryEl.innerHTML = Object.entries(partCounts).map(([part, count]) => {
        const colorClass = count > 0 ? "bg-orange-100 text-orange-700 font-bold" : "bg-gray-100 text-gray-400";
        return `<span class="px-2 py-0.5 rounded ${colorClass}">${part}: ${count}</span>`;
      }).join('');

      const listEl = document.getElementById('modal-member-list');
      listEl.innerHTML = members.length === 0 
        ? `<p class="text-[10px] text-gray-400 py-1">誰もエントリーしていません</p>` 
        : members.map(m => {
            const userBioRaw = m.bio || "";
            const userGrade = m.grade || (userBioRaw.match(/【(.*?)】/) ? userBioRaw.match(/【(.*?)】/)[1] : "新入生");
            const gradeColor = getGradeColor(userGrade);
            return `
              <span class="text-[10px] bg-orange-50 text-orange-700 px-2 py-0.5 rounded-md border border-orange-100 font-medium inline-flex items-center gap-1">
                ${m.name} <span class="text-[8px] border px-1 rounded-sm ${gradeColor} font-black">${userGrade}</span> (${(m.parts || []).join('/')})
              </span>
            `;
          }).join('');

      updateModalChatTimeline(bandId);
    }

    function updateModalChatTimeline(bandId) {
      const container = document.getElementById('modal-chat-timeline');
      if (!container) return;

      const filteredMsgs = allChatMessages.filter(m => m.band_id === bandId);

      if (filteredMsgs.length === 0) {
        container.innerHTML = `<p class="text-center text-[10px] text-gray-400 py-6">このバンドのチャットはまだありません。<br>メンバー募集や作戦会議に使おう！</p>`;
        return;
      }

      let html = "";
      filteredMsgs.forEach(m => {
        const isItMe = m.user_id === myId;
        const timeStr = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const gradeColor = getGradeColor(m.user_grade);

        if (isItMe) {
          html += `
            <div class="flex flex-col items-end space-y-0.5">
              <span class="text-[8px] text-gray-400">あなた ・ ${timeStr}</span>
              <div class="bg-orange-500 text-white text-[11px] px-2.5 py-1.5 rounded-xl rounded-tr-none max-w-[85%] break-words shadow-sm">
                ${m.text}
              </div>
            </div>
          `;
        } else {
          html += `
            <div class="flex flex-col items-start space-y-0.5">
              <div class="flex items-center gap-1">
                <span class="font-bold text-gray-700 text-[10px]">${m.user_name}</span>
                <span class="text-[7px] border px-1 rounded-full font-bold ${gradeColor}">${m.user_grade}</span>
                <span class="text-[8px] text-gray-400">${timeStr}</span>
              </div>
              <div class="bg-white border text-gray-800 text-[11px] px-2.5 py-1.5 rounded-xl rounded-tl-none max-w-[85%] break-words shadow-sm">
                ${m.text}
              </div>
            </div>
          `;
        }
      });
      
      const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 40;
      container.innerHTML = html;
      if (isAtBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }

    window.closeModal = function() {
      document.getElementById('band-modal').classList.add('hidden');
      currentSelectedBandId = null;
    }

    // 【修正】バリデーションの typo ("未設定 of 部員") を "未設定の部員" に完全修正
    async function toggleJoin(bandId) {
      if (me.name === "未設定の部員") return alert('バンドにエントリーするには、先にマイページからプロフィールを設定してください！');
      if (!me.bandIds) me.bandIds = [];
      const index = me.bandIds.indexOf(bandId);
      if (index > -1) me.bandIds.splice(index, 1);
      else me.bandIds.push(bandId);
      
      refreshUI();
      await saveMyDataToCloud();
    }
    
    render();
  </script>
</body>
</html>
