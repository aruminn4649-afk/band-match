      <h1 class="text-xl font-bold text-gray-800 flex items-center gap-1">
        <span class="text-orange-500">🎸</span> バンドマッチ
      </h1>
      <div class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-full font-semibold">Ver 1.01</div>
    </header>

    <main id="main-content" class="flex-1 overflow-y-auto p-4 pb-24">
    </main>

    <div id="band-modal" class="absolute inset-0 bg-black/50 z-20 hidden flex items-end justify-center">
      <div class="bg-white w-full rounded-t-2xl p-5 max-h-[85vh] flex flex-col space-y-3 shadow-2xl">
        <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto -mt-2 mb-1 shrink-0"></div>
        
        <div class="flex justify-between items-start shrink-0">
          <div>
            <span id="modal-band-type" class="text-[10px] font-bold text-orange-500 tracking-wider">BAND DETAILS</span>
            <h3 id="modal-band-name" class="font-extrabold text-gray-800 text-lg mt-0.5 truncate max-w-[260px]">---</h3>
            <p id="modal-band-creator" class="text-[10px] text-gray-400 mt-0.5">募集主: ---</p>
          </div>
          <div class="flex flex-col items-end gap-1 shrink-0">
            <div id="modal-band-count" class="bg-orange-500 text-white px-2.5 py-1 rounded-full font-black text-xs">🔥 0人</div>
          </div>
        </div>

        <div id="modal-admin-actions" class="flex gap-2 shrink-0 hidden">
          <button id="modal-toggle-status-btn" class="flex-1 py-1.5 rounded text-[10px] font-bold border transition-all"></button>
          <button id="modal-delete-btn" class="bg-red-50 text-red-600 border border-red-200 px-2.5 py-1.5 rounded text-[10px] font-bold active:bg-red-100">🚨 解散</button>
        </div>
        
        <button id="modal-join-btn" class="w-full py-2.5 rounded-xl font-bold text-xs shadow-md transition-all shrink-0"></button>

        <div class="bg-gray-50 border rounded-xl p-2 shrink-0">
          <span class="text-[10px] font-bold text-gray-400 block mb-1">現在のパート編成</span>
          <div id="modal-part-summary" class="flex gap-2 flex-wrap text-[10px]"></div>
        </div>

        <div class="border-t border-gray-100 pt-2 shrink-0">
          <h4 class="font-bold text-[11px] text-gray-500 mb-1 flex items-center gap-1">
            <i class="fa-solid fa-users text-orange-500"></i> エントリー中のメンバー
          </h4>
          <div id="modal-member-list" class="flex flex-wrap gap-1 max-h-[80px] overflow-y-auto"></div>
        </div>

        <div class="border-t border-gray-100 pt-2 flex-1 flex flex-col min-h-0">
          <h4 class="font-bold text-[11px] text-gray-500 mb-1 flex items-center gap-1 shrink-0">
            <i class="fa-solid fa-comments text-orange-500"></i> バンド内作戦会議チャット
          </h4>
          <div id="modal-chat-timeline" class="flex-1 overflow-y-auto space-y-2 py-1 bg-gray-50/50 rounded-lg p-2 border border-gray-100"></div>
          <div class="flex gap-1.5 mt-1.5 shrink-0">
            <input type="text" id="modal-chat-input" autocomplete="off" placeholder="このバンド内で発言..." class="flex-1 text-xs p-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:border-orange-500" onkeypress="if(event.key==='Enter') sendBandChatMessage()"/>
            <button onclick="sendBandChatMessage()" class="bg-orange-500 text-white text-xs px-3 py-2 rounded-lg font-bold shadow-sm active:bg-orange-600"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>

        <button onclick="closeModal()" class="w-full bg-gray-100 text-gray-600 py-2 rounded-lg text-xs font-semibold shrink-0">閉じる</button>
      </div>
    </div>

    function ensureArray(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      if (typeof val === 'string') {
        return val.split(',').map(s => s.trim()).filter(Boolean);
      }
      return [];
    }

    async function loadData(force = false) {
      if (isSaving && !force) return;
      try {
        const { data: userData, error: userError } = await supabaseClient.from('users').select('*');
        if (!userError && userData) {
          allUsers = userData.map(u => ({
            ...u,
            band_ids: ensureArray(u.band_ids)
          }));

          const myCloudData = allUsers.find(u => u.id === myId);
          if (myCloudData) {
            if (!me.name || me.name === "未設定の部員" || force) {
              me.name = myCloudData.name || me.name;
              me.line_id = myCloudData.line_id || me.line_id;
              me.grade = myCloudData.grade || me.grade;
              me.parts = myCloudData.parts || me.parts;
              me.bio = myCloudData.bio || me.bio;
              me.band_ids = myCloudData.band_ids;
              localStorage.setItem('k_on_me_final', JSON.stringify(me));
            }
          }
        }

        const { data: bandData, error: bandError } = await supabaseClient.from('bands').select('*');
        if (!bandError && bandData) {
          recruitedBands = bandData;
        }

        const { data: msgData, error: msgError } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: true });
        if (!msgError && msgData) {
          allChatMessages = msgData;
        }

        refreshUI();
      } catch (e) { console.error(e); }
    }

    function refreshUI() {
      if (currentTab === 'home') updateBandListOnly();
      if (currentTab === 'archive') updateArchiveListOnly();
      if (currentTab === 'search') updateUserListOnly();
      if (currentSelectedBandId) updateModalOnly(currentSelectedBandId);
    }

    setInterval(() => { loadData(false); }, 2000);
    loadData(true);

    async function saveMyDataToCloud() {
      isSaving = true;
      if (!Array.isArray(me.band_ids)) me.band_ids = [];
      localStorage.setItem('k_on_me_final', JSON.stringify(me));
      
      const tempMyCloudData = {
        id: me.id,
        name: me.name || "未設定の部員",
        grade: me.grade,
        parts: me.parts || ["ギター"],
        bio: me.bio || "",
        line_id: me.line_id || "", 
        band_ids: me.band_ids.join(',')
      };

      try {
        await supabaseClient.from('users').upsert(tempMyCloudData);
      } catch(e) { 
        console.error(e); 
      } finally {
        isSaving = false; 
        await loadData(true);
      }
    }

    async function createNewBand() {
      const bandNameInput = document.getElementById('new-band-name');
      if (!bandNameInput) return;
      const bandName = bandNameInput.value.trim();

      if (!bandName) return alert('バンド名を入力してください');
      if (!me.name || me.name === "未設定の部員") return alert('マイページからプロフィールを設定してください！');

      isSaving = true; 
      const newBandId = 'band_' + Math.random().toString(36).substr(2, 9);
      
      const newBandData = {
        id: newBandId,
        name: bandName,
        creator_id: me.id,
        creator_name: me.name,
        status: 'open'
      };

      try {
        if (!me.band_ids.includes(newBandId)) {
          me.band_ids.push(newBandId);
        }
        bandNameInput.value = "";
        refreshUI();
        
        await supabaseClient.from('bands').insert(newBandData);
        await saveMyDataToCloud();
      } catch (e) { 
        console.error(e); 
      } finally {
        isSaving = false; 
        await loadData(true);
      }
    }

    async function toggleBandStatus(bandId) {
      const band = recruitedBands.find(b => b.id === bandId);
      if (!band) return;

      isSaving = true; 
      const nextStatus = band.status === 'closed' ? 'open' : 'closed';
      band.status = nextStatus;
      refreshUI();

      try {
        await supabaseClient.from('bands').update({ status: nextStatus }).eq('id', bandId);
      } catch(e) { 
        console.error(e); 
      } finally {
        isSaving = false; 
        await loadData(true);
      }
    }

    async function deleteBand(bandId) {
      if (!confirm('このバンドを解散（削除）しますか？')) return;
      
      isSaving = true; 
      try {
        closeModal();
        me.band_ids = me.band_ids.filter(id => id !== bandId);
        refreshUI();

        await supabaseClient.from('bands').delete().eq('id', bandId);
        await supabaseClient.from('messages').delete().eq('band_id', bandId);
        await saveMyDataToCloud();
      } catch (e) { 
        console.error(e); 
      } finally {
        isSaving = false;
        await loadData(true);
      }
    }

    async function sendBandChatMessage() {
      if (!currentSelectedBandId) return;
      const chatInput = document.getElementById('modal-chat-input');
      if (!chatInput) return;
      const text = chatInput.value.trim();

      if (!text) return;
      if (me.name === "未設定の部員") return alert('発言するにはプロフィールを設定してください！');

      const newMsg = {
        id: 'msg_' + Math.random().toString(36).substr(2, 9),
        band_id: currentSelectedBandId,
        user_id: me.id,
        user_name: me.name,
        user_grade: me.grade || "新入生",
        text: text,
        created_at: new Date().toISOString()
      };

      try {
        allChatMessages.push(newMsg);
        chatInput.value = "";
        updateModalChatTimeline(currentSelectedBandId);
        await supabaseClient.from('messages').insert(newMsg);
      } catch (e) { console.error(e); }
    }

      if(grade === "4年生以上") return "bg-gray-100 text-gray-600 border-gray-200";

    function updateBandListOnly() {
      const container = document.getElementById('band-list-container');
      if (!container) return;

      const sortedBands = recruitedBands.map(b => {
        const matchingUsers = allUsers.filter(u => u.band_ids && u.band_ids.includes(b.id));
        return { ...b, count: matchingUsers.length, isMyJoined: me.band_ids.includes(b.id) };
      }).sort((a, b) => {
        const aClosed = a.status === 'closed' ? 1 : 0;
        const bClosed = b.status === 'closed' ? 1 : 0;
        return aClosed - bClosed || b.count - a.count || a.name.localeCompare(b.name);
      });

      const filteredBands = sortedBands.filter(b => b.name && b.name.toLowerCase().includes(searchQuery.toLowerCase()));

      let html = "";
      filteredBands.forEach(b => {
        const isClosed = b.status === 'closed';
        html += `
          <div data-band-id="${b.id}" class="band-card bg-white border border-gray-200 rounded-xl p-3 flex flex-col shadow-sm cursor-pointer hover:border-orange-200 ${isClosed ? 'opacity-65 bg-gray-50/50' : ''}">

        const gradeMatch = (u.grade || "").toLowerCase().includes(userSearchQuery.toLowerCase());
        const lineIdMatch = (u.line_id || "").toLowerCase().includes(userSearchQuery.toLowerCase());
        const partsMatch = (u.parts || []).some(p => p.toLowerCase().includes(userSearchQuery.toLowerCase()));

                ${userBands.length === 0 
                  ? '<span class="text-[10px] text-gray-400 italic">まだエントリーしていません</span>' 
                  : userBands.map(b => `<span class="text-[10px] bg-gray-200 text-gray-700 px-2 py-0.5 rounded-full">🎵 ${b}</span>`).join('')}
              </div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    window.switchTab = function(tab) {
      currentTab = tab;
      render();
    }

    async function saveProfile() {
      const name = document.getElementById('edit-name').value;
      const line_id = document.getElementById('edit-line-id').value;
      const grade = document.getElementById('edit-grade').value;
      const bio = document.getElementById('edit-bio').value;
      const checkboxes = document.querySelectorAll('input[name="edit-parts"]:checked');
      const parts = Array.from(checkboxes).map(cb => cb.value);

      if(!name.trim()) return alert('名前を入力してください');
      if(parts.length === 0) return alert('パートを選択してください');

      me.name = name;
      me.line_id = line_id;
      me.grade = grade;
      me.parts = parts;
      me.bio = bio;

      await saveMyDataToCloud();
      alert('保存しました！');
      switchTab('home');
    }

    function openModal(bandId) {
      currentSelectedBandId = bandId;
      updateModalOnly(bandId);
      document.getElementById('band-modal').classList.remove('hidden');
      setTimeout(scrollChatToBottom, 80);
    }

    function updateModalOnly(bandId) {
      const isCustom = bandId.startsWith('band_');
      const band = isCustom 
        ? recruitedBands.find(b => b.id === bandId) 
        : FIXED_BANDS.find(b => b.id === bandId);

      if(!band) return;

      const members = allUsers.filter(u => u.band_ids && u.band_ids.includes(bandId));
      const isMyJoined = me.band_ids.includes(bandId);
      const isClosed = isCustom && band.status === 'closed';

      document.getElementById('modal-band-type').innerText = isCustom ? '自由追加募集アイテム' : '固定緩募アイテム';
      document.getElementById('modal-band-name').innerText = band.name;
      document.getElementById('modal-band-creator').innerText = isCustom ? `募集主: ${band.creator_name || '不明'}` : '固定リスト';
      document.getElementById('modal-band-count').innerText = isClosed ? '🔒 締切済' : `🔥 ${members.length}人`;

      const adminActions = document.getElementById('modal-admin-actions');
      if (isCustom && band.creator_id === me.id) {
        adminActions.classList.remove('hidden');
        const statusBtn = document.getElementById('modal-toggle-status-btn');
        if (isClosed) {
          statusBtn.innerText = '🔓 募集を再開する';
          statusBtn.className = 'flex-1 py-1.5 rounded text-[10px] font-bold bg-green-50 text-green-600 border border-green-200 active:bg-green-100';
        } else {
          statusBtn.innerText = '🔒 募集を締め切る';
          statusBtn.className = 'flex-1 py-1.5 rounded text-[10px] font-bold bg-gray-100 text-gray-600 border border-gray-300 active:bg-gray-200';
        }
        statusBtn.onclick = () => toggleBandStatus(bandId);
        document.getElementById('modal-delete-btn').onclick = () => deleteBand(bandId);
      } else {
        adminActions.classList.add('hidden');
      }

      const joinBtn = document.getElementById('modal-join-btn');
      if (isMyJoined) {
        joinBtn.innerText = 'エントリーを解除する';
        joinBtn.className = 'w-full bg-gray-200 text-gray-600 py-2.5 rounded-xl font-bold text-xs border active:bg-gray-300';
        joinBtn.disabled = false;
      } else if (isClosed) {
        joinBtn.innerText = '募集締め切りにつき追加エントリー不可';
        joinBtn.className = 'w-full bg-gray-200 text-gray-400 py-2.5 rounded-xl font-bold text-xs border cursor-not-allowed';
        joinBtn.disabled = true;
      } else {
        joinBtn.innerText = 'このバンドをやりたい！';
        joinBtn.className = 'w-full bg-orange-500 text-white py-2.5 rounded-xl font-bold text-xs shadow-md active:bg-orange-600';
        joinBtn.disabled = false;
      }
      joinBtn.onclick = () => toggleJoin(bandId);

      const partCounts = { 'ボーカル': 0, 'ギター': 0, 'ベース': 0, 'ドラム': 0, 'キーボード': 0 };
      members.forEach(m => {
        if (m.parts) m.parts.forEach(p => { if (p in partCounts) partCounts[p]++; });
      });
      const summaryEl = document.getElementById('modal-part-summary');
      summaryEl.innerHTML = Object.entries(partCounts).map(([part, count]) => {
        const color = count > 0 ? 'bg-orange-100 text-orange-700 font-bold border-orange-200' : 'bg-gray-100 text-gray-400 border-gray-200/60';
        return `<span class="px-2 py-0.5 border rounded ${color}">${part}: ${count}</span>`;
      }).join('');

      const listEl = document.getElementById('modal-member-list');
      listEl.innerHTML = members.length === 0 
        ? `<p class="text-[11px] text-gray-400 italic w-full text-center py-2">誰も選択していません</p>` 
        : members.map(m => {
            const gradeColor = getGradeColor(m.grade);
            return `
              <div class="inline-flex items-center gap-1 bg-orange-50/70 border border-orange-100 px-2 py-1 rounded-lg text-xs">
                <span class="font-bold text-gray-800">${m.name}</span>
                <span class="text-[8px] px-1 rounded border ${gradeColor} font-black scale-90">${m.grade || '新入生'}</span>
                <span class="text-[9px] text-orange-600 font-semibold">${(m.parts || []).join('/')}</span>
                ${m.line_id ? `<span class="text-[9px] text-green-600 font-bold ml-0.5" title="LINE ID: ${m.line_id}"><i class="fa-brands fa-line"></i></span>` : ''}
              </div>
            `;
          }).join('');

      updateModalChatTimeline(bandId);
    }

    function updateModalChatTimeline(bandId) {
      const chatTimeline = document.getElementById('modal-chat-timeline');
      if (!chatTimeline) return;

      const filteredMsgs = allChatMessages.filter(m => m.band_id === bandId);
      if (filteredMsgs.length === 0) {
        chatTimeline.innerHTML = `<p class="text-[10px] text-gray-400 text-center py-6 italic">作戦会議チャットにまだ発言はありません</p>`;
        return;
      }

      chatTimeline.innerHTML = filteredMsgs.map(m => {
        const isMe = m.user_id === myId;
        const gradeColor = getGradeColor(m.user_grade);
        return `
          <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} space-y-0.5">
            <div class="flex items-center gap-1 text-[9px] text-gray-400">
              <span class="font-bold text-gray-600">${m.user_name}</span>
              <span class="px-1 rounded border ${gradeColor} font-black scale-75 origin-left">${m.user_grade || '新入生'}</span>
            </div>
            <div class="p-2 rounded-xl text-xs max-w-[85%] break-words shadow-sm ${isMe ? 'bg-orange-500 text-white rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none border border-gray-100'}">
              ${m.text}
            </div>
          </div>
        `;
      }).join('');
    }

    function scrollChatToBottom() {
      const chatTimeline = document.getElementById('modal-chat-timeline');
      if (chatTimeline) chatTimeline.scrollTop = chatTimeline.scrollHeight;
    }

    window.closeModal = function() {
      document.getElementById('band-modal').classList.add('hidden');
      currentSelectedBandId = null;
    }

    async function toggleJoin(bandId) {
      if (!me.band_ids) me.band_ids = [];
      const index = me.band_ids.indexOf(bandId);
      if (index > -1) me.band_ids.splice(index, 1);
      else me.band_ids.push(bandId);
      
      refreshUI();
      await saveMyDataToCloud();
    }

    // 初回レンダリング
    render();
  </script>
</body>
</html>
